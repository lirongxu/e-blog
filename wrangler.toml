name = "e-blog"
main = "src/index.ts"
compatibility_date = "2025-05-01"

[vars]
SITE_TITLE = "E-Blog"
SITE_DESCRIPTION = "A personal blog on Cloudflare"

# ADMIN_PASSWORD should be set via: wrangler secret put ADMIN_PASSWORD

[[d1_databases]]
binding = "DB"
database_name = "e-blog-db"
database_id = "placeholder-replace-after-creation"

[[kv_namespaces]]
binding = "KV"
id = "placeholder-replace-after-creation"
